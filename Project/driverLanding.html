<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Driver Dashboard</title>

  <link rel="stylesheet" href="driverLanding.css">
</head>

<body>

  <div class="container">
    <div class="card">
      <h1>Driver Dashboard</h1>

      <div class="section">
        <h2>Shift Control</h2>
        <button class="btn">Start Shift</button>
        <button class="btn secondary">End Shift</button>
      </div>

      <div class="section">
        <h2>Assigned Trips</h2>
        <button class="btn">View Trips</button>
      </div>

      <div class="section">
        <h2>Bus Status</h2>
        <button class="btn">Update Status</button>
      </div>

    </div>
  </div>

  <div class="footer">
    <div>Home</div>
    <div>Trips</div>
    <div>Account</div>
  </div>

</body>
</html>
